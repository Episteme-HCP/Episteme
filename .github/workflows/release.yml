name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0-beta2). Leave empty to use the version from pom.xml.'
        required: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'oracle'
          cache: maven
          server-id: github

      - name: Set release version
        id: versioning
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION=${{ github.event.inputs.version }}
          elif [[ $GITHUB_REF == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            # Fallback to current version in pom.xml
            VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          fi
          echo "RELEASE_VERSION=$VERSION" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Install MPJ to Maven Local
        shell: bash
        run: |
          mvn -B install:install-file -Dfile="libs/mpj.jar" -DgroupId=org.mpjexpress -DartifactId=mpj -Dversion=0.44 -Dpackaging=jar
          mvn -B install:install-file -Dfile="libs/mpi.jar" -DgroupId=org.mpjexpress -DartifactId=mpi -Dversion=0.44 -Dpackaging=jar

      - name: Update versions in POMs
        shell: bash
        run: |
          mvn -B versions:set -DnewVersion=${{ steps.versioning.outputs.VERSION }} -DgenerateBackupPoms=false

      - name: Build & Deploy to GitHub Packages (JDK 25)
        # builds, attaches fat jars, and deploys to GitHub Packages
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mvn -B deploy -DskipTests -Djacoco.skip=true -Prelease-jdk25,fat-jar

      - name: Build & Deploy to GitHub Packages (JDK 21)
        # builds, attaches fat jars, and deploys to GitHub Packages
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mvn -B deploy -DskipTests -Djacoco.skip=true -Prelease-jdk21,fat-jar

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.versioning.outputs.VERSION }}
          name: Release v${{ steps.versioning.outputs.VERSION }}
          # Collect all jars from all modules' target directories
          files: |
            **/target/*.jar
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(steps.versioning.outputs.VERSION, 'beta') || contains(steps.versioning.outputs.VERSION, 'alpha') }}
