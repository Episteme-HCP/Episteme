name: Episteme CI (JDK 25)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build on ${{ matrix.os }} (JDK 25)
    runs-on: ${{ matrix.os }}
    strategy:
      max-parallel: 1
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false

    env:
      MAVEN_OPTS: "--add-modules jdk.incubator.vector --enable-native-access=ALL-UNNAMED -Dhttp.keepAlive=false -Dmaven.wagon.http.pool=false -Dmaven.wagon.http.retryHandler.count=3 -Dmaven.wagon.httpconnectionManager.ttlSeconds=120"

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'oracle'
        cache: maven

    - name: Install MPJ to Maven Local
      shell: bash
      run: |
        mvn -B install:install-file -Dfile="libs/mpj.jar" -DgroupId=org.mpjexpress -DartifactId=mpj -Dversion=0.44 -Dpackaging=jar
        mvn -B install:install-file -Dfile="libs/mpi.jar" -DgroupId=org.mpjexpress -DartifactId=mpi -Dversion=0.44 -Dpackaging=jar

    - name: Build with Maven
      shell: bash
      run: mvn -B -T 1C install -DskipTests -Djacoco.skip=true -Dtarget.java.version=25 --file pom.xml

    - name: Run Benchmarks (CLI)
      shell: bash
      run: echo "Benchmarks skipped in standard CI to avoid hangs on volatile GHA environments."

    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.os }}-jdk25
        path: |
          **/target/surefire-reports/*.xml
          **/target/failsafe-reports/*.xml
